id           = "radimous/prism-instances"
name         = "PrismLauncher Instances"
version      = "1.0.0"
min_noctalia = "5.0.0"
author       = "radimous"
license = "MIT"


[[launcher_provider]]
id = "prism-instances"
entry = "prism-instances.luau"
prefix = "/pl"
glyph = "nut"
include_in_global_search = false
debounce_ms = 0

[[setting]]
key = "prism_path"
type = "string"
label = "PrismLauncher path"
description = "Path to PrismLauncher"
default = "~/.local/share/PrismLauncher"
